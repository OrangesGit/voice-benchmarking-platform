providers:
  - name: openai_whisper
    display_name: "OpenAI Whisper"
    api_key_env: OPENAI_API_KEY
    cost_per_minute_usd: 0.006
    model_version: whisper-1
    available_models:
      - id: whisper-1
        display_name: "Whisper-1"
        cost_per_minute_usd: 0.006
      - id: gpt-4o-transcribe
        display_name: "GPT-4o Transcribe"
        cost_per_minute_usd: 0.006
        body_fields:                     # verbose_json not supported; override to json
          model: "{{model_version}}"
          response_format: json
      - id: gpt-4o-mini-transcribe
        display_name: "GPT-4o Mini Transcribe"
        cost_per_minute_usd: 0.003
        body_fields:                     # verbose_json not supported; override to json
          model: "{{model_version}}"
          response_format: json
    request:
      method: POST
      url: "https://api.openai.com/v1/audio/transcriptions"
      auth:
        type: bearer
      body:
        type: multipart
        file_field: file
        fields:
          model: "{{model_version}}"
          response_format: verbose_json
    response:
      transcript: text
      duration: duration
      language: language
      confidence: ~
      words: ~

  - name: deepgram
    display_name: "Deepgram"
    api_key_env: DEEPGRAM_API_KEY
    cost_per_minute_usd: 0.0043
    model_version: nova-2
    available_models:
      - id: nova-2
        display_name: "Nova-2"
        cost_per_minute_usd: 0.0043
      - id: nova-2-general
        display_name: "Nova-2 General"
        cost_per_minute_usd: 0.0043
      - id: enhanced
        display_name: "Enhanced"
        cost_per_minute_usd: 0.0043
      - id: base
        display_name: "Base"
        cost_per_minute_usd: 0.0025
    request:
      method: POST
      url: "https://api.deepgram.com/v1/listen"
      auth:
        type: token
      params:
        model: "{{model_version}}"
        smart_format: "true"
        punctuate: "true"
      body:
        type: raw
        content_type: audio/wav
    response:
      transcript: "results.channels[0].alternatives[0].transcript"
      duration: "metadata.duration"
      language: "metadata.detected_language"
      confidence: "results.channels[0].alternatives[0].confidence"
      words: "results.channels[0].alternatives[0].words"
